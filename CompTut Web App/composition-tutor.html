<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Composition Tutor - Guided Diagnostic Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .question-text {
            font-size: 22px;
            color: #333;
            margin-bottom: 24px;
            font-weight: 500;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option-button {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 18px 20px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .option-button:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(4px);
        }
        
        .option-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .option-subtitle {
            font-size: 14px;
            color: #888;
        }
        
        .text-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 16px;
        }
        
        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-button {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .submit-button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .diagnostic-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        
        .diagnostic-header h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .diagnostic-block {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .diagnostic-block h3 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .diagnostic-block ul {
            list-style: none;
            padding: 0;
        }
        
        .diagnostic-block li {
            padding: 10px 0;
            padding-left: 24px;
            position: relative;
            color: #333;
            line-height: 1.6;
        }
        
        .diagnostic-block li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
        
        .breadcrumb {
            background: #f5f5f5;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #666;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        
        .back-button, .reset-button, .claude-button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .back-button {
            background: #e0e0e0;
            color: #333;
        }
        
        .back-button:hover { background: #d0d0d0; }
        
        .reset-button {
            background: #f44336;
            color: white;
        }
        
        .reset-button:hover { background: #da190b; }
        
        .claude-button {
            background: #764ba2;
            color: white;
            flex: 1;
            min-width: 200px;
        }
        
        .claude-button:hover {
            background: #5f3980;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.4);
        }
        
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .header h1 { font-size: 24px; }
            .question-text { font-size: 18px; }
            .button-group { flex-direction: column; }
            .claude-button { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Composition Tutor</h1>
            <p>Guided diagnostic tool for compositional problem-solving</p>
        </div>
        <div id="app"></div>
    </div>
    
    <script src="questions.js"></script>
    <script src="diagnostics.js"></script>
    <script src="app.js"></script>
</body>
</html>
